version: '3.9'

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/setup.sql:/docker-entrypoint-initdb.d/01-setup.sql:ro
      - ./db/setup_tables.sql:/docker-entrypoint-initdb.d/02-setup_tables.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      target: service
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    command: uvicorn src.main:app --host 0.0.0.0 --port 8080

volumes:
  pgdata:
